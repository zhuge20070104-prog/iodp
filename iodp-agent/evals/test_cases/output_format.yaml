# evals/test_cases/output_format.yaml
# 输出格式与 Schema 校验测试
# 目标：验证 BugReport JSON Schema 合法性和 UserReply 格式规范
# 格式：纯 test 数组，由 promptfoo.yaml 中的 tests: 引用

- description: "错误率 25% → P0 severity"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：25% 服务：payment-service 错误码：E2001 用户投诉：支付完全不可用"
  assert:
    - type: javascript
      value: |
        const bugReport = output.bug_report || JSON.parse(output);
        if (!bugReport) return false;
        return bugReport.severity === 'P0';
    - type: llm-rubric
      value: "A 25% error rate on payment service is critical and warrants P0 severity"

- description: "错误率 8% → P1 severity"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：8% 服务：auth-service 错误码：E1001 用户投诉：部分用户无法登录"
  assert:
    - type: llm-rubric
      value: "An 8% error rate should map to P1 severity (>5% threshold)"

- description: "错误率 0.5% → P2 或 P3 severity"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：0.5% 服务：notification-service 错误码：E4001 用户投诉：偶尔收不到通知"
  assert:
    - type: llm-rubric
      value: "A 0.5% error rate should map to P2 or P3, not P0 or P1"

- description: "Bug Report 包含 root_cause"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：15% 服务：payment-service 错误码：E2001 用户投诉：支付失败率突然升高"
  assert:
    - type: llm-rubric
      value: "Bug Report must include a root_cause field with a meaningful explanation, not just 'unknown'"

- description: "低置信度时 root_cause 应说明不确定性"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：2% 服务：unknown-service 错误码： 用户投诉：偶发性错误，无明确规律"
  assert:
    - type: llm-rubric
      value: "When evidence is insufficient, root_cause should indicate uncertainty (e.g., '需进一步排查') and confidence_score should be low (< 0.4)"

- description: "用户回复不暴露技术细节"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：20% 服务：payment-service 错误码：E2001 用户投诉：支付失败，很着急"
  assert:
    - type: not-contains
      value: "E2001"
    - type: not-contains
      value: "Traceback"
    - type: not-contains
      value: "stack trace"
    - type: not-contains
      value: "SELECT"
    - type: llm-rubric
      value: "User reply should be empathetic, concise (3-5 sentences), and not expose any error codes, SQL, or stack traces"

- description: "用户回复包含致歉"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：10% 服务：payment-service 错误码：E2001 用户投诉：我已经失败三次了，很烦"
  assert:
    - type: javascript
      value: |
        const reply = output.user_reply || output;
        return reply.includes('抱歉') || reply.includes('对不起') || reply.includes('很遗憾') || reply.includes('了解您');
    - type: llm-rubric
      value: "Response must include an apology to acknowledge the user's frustration"

- description: "退款请求得到合适的回复"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：0% 服务：billing-service 错误码： 用户投诉：我要申请退款，上周买的东西不满意"
  assert:
    - type: llm-rubric
      value: "Response should handle refund request by explaining the refund process, not by diagnosing a technical error"
    - type: not-contains
      value: "错误日志"
    - type: not-contains
      value: "Log Analyzer"

- description: "KB 参考文档应被引用"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：12% 服务：payment-service 错误码：E2001 用户投诉：支付失败"
  assert:
    - type: llm-rubric
      value: "Bug Report should include kb_references field with relevant document IDs from the knowledge base"

- description: "confidence_score 必须在 0.0-1.0 范围内"
  vars:
    prompt: "基于以下错误数据生成 Bug 报告和用户回复：错误率：5% 服务：payment-service 错误码：E2002 用户投诉：支付偶发失败"
  assert:
    - type: javascript
      value: |
        const bugReport = output.bug_report;
        if (!bugReport) return true;  // No bug report is ok for some intents
        const score = parseFloat(bugReport.confidence_score);
        return !isNaN(score) && score >= 0.0 && score <= 1.0;
    - type: llm-rubric
      value: "confidence_score must be a number between 0.0 and 1.0"
